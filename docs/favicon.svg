<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background — dark rounded square, matches how browser tabs render app icons -->
  <rect width="32" height="32" rx="7" fill="#1a1a1a"/>
  <!-- Black radio behind -->
  <g transform="translate(4, 3) rotate(5, 8, 16)">
    <rect x="5" y="0.5" width="3" height="7" rx="1.5" fill="#333333"/>
    <rect x="1.5" y="6.5" width="13" height="21" rx="2.5" fill="#333333"/>
  </g>
  <!-- Yellow radio front -->
  <rect x="5" y="0.5" width="3" height="7" rx="1.5" fill="#FFE135"/>
  <circle cx="6.5" cy="0.5" r="1.4" fill="#C9AB00"/>
  <rect x="1.5" y="6.5" width="13" height="21" rx="2.5" fill="#FFE135"/>
  <rect x="1.5" y="6.5" width="13" height="2.5" rx="2" fill="#C9AB00" opacity="0.35"/>
  <rect x="4" y="10"   width="8" height="1.1" rx="0.5" fill="#8B7400" opacity="0.5"/>
  <rect x="4" y="12"   width="8" height="1.1" rx="0.5" fill="#8B7400" opacity="0.5"/>
  <rect x="4" y="14"   width="8" height="1.1" rx="0.5" fill="#8B7400" opacity="0.5"/>
  <circle cx="6.5" cy="18.5" r="1.2" fill="#22c55e" opacity="0.9"/>
  <rect x="3.5" y="21" width="8.5" height="3.5" rx="1.5" fill="#C9AB00" opacity="0.6"/>
  <!-- Sound waves -->
  <path d="M 16 13.5 A 3 3 0 0 1 16 19.5" stroke="#FFE135" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 18.5 11 A 5.5 5.5 0 0 1 18.5 22" stroke="#FFE135" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
</svg>
